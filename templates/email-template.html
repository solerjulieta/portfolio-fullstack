<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Contacto Portfolio</title>
</head>
<body style="font-family: sans-serif; background-color: #f4f4f4; padding: 20px;">
    <table width="600" border="0" cellspacing="0" cellpadding="0" style="background-color: #ffffff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <tr>
            <td style="padding: 30px;">
                <h1 style="color: #9966cc; margin: 0; font-size: 24px;">
                    👋 Nuevo Contacto de {{name}}
                </h1>
                
                <p>
                    <strong>Nombre:</strong> {{name}}
                </p>
                <p>
                    <strong>Email:</strong> <a href="mailto:{{email}}" style="color: #9966cc;">{{email}}</a>
                </p>

                <div style="background-color: #f9f9f9; border-left: 4px solid #9966cc; padding: 15px;">
                    <p style="font-style: italic; white-space: pre-wrap; margin: 0; color: #555555;">{{message}}</p>
                </div>
            </td>
            </tr>
    </table>
</body>
</html>
